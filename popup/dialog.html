<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="dialog.css" />
  </head>

  <style>
    * {
      font-family: Arial, Helvetica, sans-serif;
    }

    html,
    body {
      background-color: #eee;
      border-radius: 1rem;
    }

    .updater {
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    #footer {
      padding-top: 0.5rem;
    }
  </style>

  <body>
    <div>
      <h3>Site: <span class="domain-span"></span></h3>

      <div id="site-specific-data" style="display: none">
        <p>
          You have viewed <span class="total-span">0</span>/<span class="limit-span">0</span> pages on this site today
        </p>
      </div>

      <div id="general-data">
        <p>To add this site to your limit list, open the settings page</p>
      </div>

      <div id="footer">
        <button id="settings-button">Settings</button>
      </div>
    </div>

    <script type="module" src="dialog.js"></script>
  </body>
</html>
