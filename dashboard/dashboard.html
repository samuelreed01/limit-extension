<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Limiter Options</title>
  </head>

  <style>
    * {
      font-family: Arial, Helvetica, sans-serif;
    }

    table,
    th,
    td {
      padding: 0.3rem;
      border-collapse: collapse;
    }

    tbody tr:nth-child(odd) {
      background-color: #eee;
    }

    .left-align {
      text-align: left;
    }

    .button-wrapper {
      display: flex;
      gap: 0.5rem;
    }

    table {
      margin-top: 1rem;
      /* border-radius: 1rem; */
      background-color: #cce;
      padding: 0 0.5rem;
      width: 100%;
    }
  </style>
  <body>
    <h1>Limit Options</h1>

    <div>
      <label
        >Add new domain
        <input type="text" id="domain-input" />
      </label>
      <label
        >Limit
        <input type="number" id="limit-input" value="5" />
      </label>
      <button id="add-domain-button">Add domain</button>
    </div>

    <table>
      <thead>
        <tr>
          <th class="left-align">Domain</th>
          <th>Limit</th>
          <th>Used today</th>
          <th></th>
        </tr>
      </thead>

      <tbody id="domains-table"></tbody>
    </table>

    <div>
      <h3>Extra options</h3>
      <div>
        <label>
          <input type="checkbox" id="block-all-reddit"></input>
          Block all of Reddit
        </label>
      </div>
      <div>
        <label>
          <input type="checkbox" id="block-subreddits"></input>
          Block Reddit homepage and subreddits only (allow opening specific threads)
        </label>
      </div>
      <div>
        <label>
          <input type="checkbox" id="enable-lock"></input>
          Enable self-control lock (makes you perform a tedious task before allowing usage increase)
        </label>
      </div>
    </div>

    <dialog id="challenge-dialog" closedby="any">
      <h3>To increase your limits, pass the following annoying test.</h3>
      <p>Copy the following text exactly:</p>
      <p id="challenge-text">Llama</p>
      <input id="challenge-input" />
      <button id="challenge-button">Enter</button>
    </dialog>

    <script type="module" src="dashboard.js"></script>
  </body>
</html>
